<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Portfolio</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }body {
  background: #0f172a;
  color: #fff;
}

header {
  padding: 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: #020617;
  position: sticky;
  top: 0;
}

header h1 {
  font-size: 24px;
  color: #38bdf8;
}

nav a {
  color: #fff;
  margin-left: 20px;
  text-decoration: none;
  transition: 0.3s;
}

nav a:hover {
  color: #38bdf8;
}

.hero {
  height: 90vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
}

.hero h2 {
  font-size: 48px;
  margin-bottom: 10px;
}

.hero p {
  font-size: 18px;
  color: #94a3b8;
}

.btn {
  margin-top: 20px;
  padding: 10px 20px;
  background: #38bdf8;
  color: #000;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

.section {
  padding: 60px 20px;
  text-align: center;
}

.section h2 {
  margin-bottom: 30px;
  font-size: 32px;
}

.projects {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 20px;
}

.card {
  background: #020617;
  padding: 20px;
  border-radius: 15px;
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-10px);
}

.card img {
  width: 100%;
  border-radius: 10px;
  margin-bottom: 10px;
}

footer {
  padding: 20px;
  text-align: center;
  background: #020617;
  margin-top: 40px;
  color: #94a3b8;
}
.projects-container {
    display: grid;
    grid-template-columns: repeat(3, 1fr); /* 3 جنب بعض */
    gap: 20px;
}

.project-card {
    width: 100%;
    height: 250px; /* نفس الارتفاع لكل الكروت */
    overflow: hidden;
    border-radius: 12px;
}

.project-card img {
    width: 100%;
    height: 100%;
    object-fit: cover; /* يخلي الصور تتملى من غير ما تبوظ */
    display: block;
}
/* Popup background */
.modal {
    display: none;
    position: fixed;
    z-index: 999;
    padding-top: 50px;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(0,0,0,0.9);
}

/* الصورة المكبرة */
.modal img {
    display: block;
    margin: auto;
    max-width: 90%;
    max-height: 90%;
    border-radius: 10px;
}

.project-card {
    width: 100%;
    height: 250px;
    overflow: hidden;
    position: relative;
    border-radius: 12px;
}

.project-card img {
    width: 100%;
    height: 100%;
    object-fit: cover; /* الوضع الطبيعي */
    transition: 2s ease;
}

/* عند الـ Hover */
.project-card:hover img {
    object-fit: contain; /* تظهر الصورة كاملة */
    background-color: #000; /* خلفية لو في فراغ */
}
/* Full screen overlay */
#fullscreen {
    display: none;
    position: fixed;
    z-index: 9999;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.95);
    justify-content: center;
    align-items: center;
}

/* الصورة */
#fullscreen img {
    max-width: 95%;
    max-height: 95%;
    border-radius: 10px;
}
.contactcontainer{
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-around;
    gap: 3rem;
    margin: 2rem auto;
    max-width: 1000px;
}
.contacttitle{
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 5px;
    margin-bottom: 10px;
    font-size: 2rem;
}
.contact{
    display: flex;
    align-items: center;
    justify-content: center;
    margin-right: 5rem;
    gap: 20rem;
}
.contact h3, .contact a{
    color: #eeeeee;
    text-decoration: none;
}
.emailandphone{
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.8rem;
}
footer {
    color: #eeeeee;
    padding: 2rem;
    text-align: center;
    
}

  </style>
